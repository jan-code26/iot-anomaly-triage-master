services:
  - type: web
    name: iot-anomaly-triage
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LLM_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
